apiVersion: apps/v1
kind: Deployment
metadata:
  name: gprod-backend
  namespace: prod-gprod
  labels:
    app: gprod-backend
    environment: production
spec:
  replicas: 3  # Production scale
  selector:
    matchLabels:
      app: gprod-backend
  template:
    metadata:
      labels:
        app: gprod-backend
        environment: production
    spec:
      imagePullSecrets:
        - name: ghcr
      nodeSelector:
        kubernetes.io/hostname: kczdjomrqi
      containers:
        - name: backend
          image: ghcr.io/themacroeconomicdao/gprod-backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: APP_NAME
              value: GPROD API PROD
            - name: APP_VERSION
              value: 1.0.0
            - name: CORS_ENABLED
              value: "true"
            - name: CORS_ORIGIN
              value: https://gprod.build.infra.gyber.org,https://api.gprod.build.infra.gyber.org
            - name: DOMAIN
              value: api.gprod.build.infra.gyber.org
            - name: JWT_EXPIRES
              value: 1h
            - name: JWT_REFRESH_EXPIRES
              value: 30d
            - name: LOG_LEVEL
              value: info  # Production log level
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: RATE_LIMIT_MAX
              value: "500"  # More restrictive for production
            - name: RATE_LIMIT_WINDOW_MS
              value: "900000"
            - name: SUPPORT_EMAIL
              value: support@gprod.org
          envFrom:
            - secretRef:
                name: gprod-backend-env
          resources:
            limits:
              cpu: "2"      # Higher limits for production
              memory: 2Gi
            requests:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 5 