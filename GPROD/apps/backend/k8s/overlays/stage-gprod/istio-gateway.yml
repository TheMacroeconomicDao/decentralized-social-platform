apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: gprod-backend-gateway
  namespace: stage-gprod
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - api.stage.gprod.build.infra.gyber.org
    tls:
      httpsRedirect: true
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: gprod-stage-tls
    hosts:
    - api.stage.gprod.build.infra.gyber.org
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: gprod-backend-vs
  namespace: stage-gprod
spec:
  hosts:
  - api.stage.gprod.build.infra.gyber.org
  gateways:
  - gprod-backend-gateway
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: gprod-backend.stage-gprod.svc.cluster.local
        port:
          number: 80 